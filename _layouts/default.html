<!DOCTYPE html>
<html lang="ja">
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:image"
      content="{{ page.image | default: '/images/blog/ogp.png' | absolute_url }}">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page.title | default: site.title }}">
<meta name="twitter:description" content="{{ page.description | default: site.description }}">
<meta name="twitter:image" content="{{ '/images/ogp.png' | absolute_url }}">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">

  <title>
    {% if page.title %}
      {{ page.title }} | {{ site.title }}
    {% else %}
      {{ site.title }}
    {% endif %}
  </title>

  <!-- OGP -->
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:locale" content="ja_JP">

  <meta name="twitter:image"
      content="{{ page.image | default: '/images/blog/ogp.png' | absolute_url }}">

  <!-- X(Twitter) -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title | default: site.title }}">
  <meta name="twitter:description" content="{{ page.description | default: site.description }}">
  <meta name="twitter:image"
        content="{{ page.image | default: '/images/ogp.png' | absolute_url }}">

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="icon"
        href="{{ '/images/pyladyfujigirlrbg.svg' | relative_url }}"
        type="image/svg+xml">

  <link rel="icon"
        type="image/png"
        href="{{ '/images/favicon-32x32.png' | relative_url }}">

  <link rel="stylesheet"
        href="{{ '/style.css' | relative_url }}">
</head>

<body>
<header class="header">
  <div class="container header-inner">
    <div class="logo">
      <a href="{{ '/' | relative_url }}">
        <img src="{{ '/images/pylady_fujigirl_.png' | relative_url }}" alt="PyLadies Shizuoka">
        <h2>PyLadies Shizuoka</h2>
      </a>
    </div>

    <button class="menu-toggle" aria-label="メニューを開く" aria-expanded="false" aria-controls="site-nav">
      <i class="fa-solid fa-bars"></i>
    </button>

    <nav class="nav" id="site-nav">
      <ul>
        <li>
          <a href="{{ '/' | relative_url }}#about">
            <span class="nav-en">About</span>
            <span class="nav-ja">PyLadies Shizuoka とは</span>
          </a>
        </li>
        <li>
          <a href="{{ '/' | relative_url }}#community">
            <span class="nav-en">Community</span>
            <span class="nav-ja">参加者募集中！</span>
          </a>
        </li>
        <li>
          <a href="{{ '/' | relative_url }}#events">
            <span class="nav-en">Events</span>
            <span class="nav-ja">イベント</span>
          </a>
        </li>
        <li>
          <a href="{{ '/' | relative_url }}#blog-preview">
            <span class="nav-en">Blog</span>
            <span class="nav-ja">活動記録</span>
          </a>
        </li>
        <li>
          <a href="{{ '/' | relative_url }}#social">
            <span class="nav-en">Social Media</span>
            <span class="nav-ja">SNS</span>
          </a>
        </li>
        <li>
          <a href="{{ '/coc/coc.html' | relative_url }}">
            <span class="nav-en">Code of Conduct</span>
            <span class="nav-ja">行動規範</span>
          </a>
        </li>
      </ul>
    </nav>
  </div>
</header>

<main>
  {{ content }}
</main>

<footer>
  <div class="container">
    <p>Copyright PyLadies Shizuoka <span id="year"></span></p>
  </div>
</footer>

<script>
const year = document.getElementById("year");
if (year) {
  year.textContent = new Date().getFullYear();
}

const header = document.querySelector(".header");
if (header) {
  window.addEventListener("scroll", () => {
    if (window.scrollY > 40) {
      header.classList.add("shrink");
    } else {
      header.classList.remove("shrink");
    }
  });
}

const toggle = document.querySelector(".menu-toggle");
const nav = document.querySelector(".nav");

if (toggle && nav) {
  toggle.addEventListener("click", () => {
    nav.classList.toggle("open");
    const isOpen = nav.classList.contains("open");
    toggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
  });

  document.querySelectorAll(".nav a").forEach(link => {
    link.addEventListener("click", () => {
      nav.classList.remove("open");
      toggle.setAttribute("aria-expanded", "false");
    });
  });
}
</script>
</body>
</html>
